name: Platform CI

on:
  pull_request:
    paths:
      - 'platform/**'
      - '.github/workflows/platform-ci.yml'
  push:
    branches: [main, 'claude/**']
    paths:
      - 'platform/**'
      - '.github/workflows/platform-ci.yml'

concurrency:
  group: platform-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 서버 운영환경 빌드옵션 검증 — macOS / Linux / Windows 3-OS 매트릭스
  backend:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Disable autocrlf (Windows diff tests)
        run: git config --global core.autocrlf false
        working-directory: .
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: platform/requirements.txt
      - run: pip install -r requirements.txt pytest
      - run: python -m pytest tests/ -q

  console:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/console
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/console/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
